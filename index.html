<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
}

.card{
background:#1e293b;
border-radius:18px;
padding:18px;
}

</style>

</head>


<body class="p-4">

<div class="max-w-4xl mx-auto">

<h1 class="text-3xl font-bold mb-6 text-purple-400">
Finance AI
</h1>

<!-- LOGIN -->

<div id="login" class="card space-y-2">

<input id="email" placeholder="email"
class="w-full p-3 rounded text-black">

<input id="password" type="password" placeholder="senha"
class="w-full p-3 rounded text-black">

<button onclick="register()"
class="bg-purple-600 w-full p-3 rounded">
Registrar
</button>

<button onclick="login()"
class="bg-green-600 w-full p-3 rounded">
Entrar
</button>

</div>


<div id="app" class="hidden space-y-6">

<!-- SALDO -->

<div class="card">

<h2 class="text-gray-400">Saldo Total</h2>

<h1 id="saldoTotal" class="text-4xl font-bold text-green-400">
R$ 0
</h1>

</div>


<!-- GRAFICO -->

<div class="card">

<canvas id="grafico"></canvas>

</div>


<!-- NOVA TRANSAÇÃO -->

<div class="card space-y-2">

<h3 class="text-purple-400">Nova Transação</h3>

<input id="descricao" placeholder="descrição"
class="w-full p-2 rounded text-black">

<input id="valor" type="number" placeholder="valor"
class="w-full p-2 rounded text-black">

<select id="tipo"
class="w-full p-2 rounded text-black">

<option value="entrada">Receita</option>
<option value="saida">Despesa</option>

</select>

<input id="data" type="date"
class="w-full p-2 rounded text-black">

<button onclick="salvarTransacao()"
class="bg-purple-600 w-full p-3 rounded">
Salvar
</button>

</div>


<!-- CONTAS RECORRENTES -->

<div class="card space-y-2">

<h3 class="text-blue-400">Conta Recorrente</h3>

<input id="recNome" placeholder="nome"
class="w-full p-2 rounded text-black">

<input id="recValor" type="number" placeholder="valor"
class="w-full p-2 rounded text-black">

<input id="recDia" type="number" placeholder="dia do mês"
class="w-full p-2 rounded text-black">

<button onclick="salvarRecorrente()"
class="bg-blue-600 w-full p-3 rounded">
Salvar
</button>

<ul id="listaRec"></ul>

</div>


<!-- PROVISÃO -->

<div class="card space-y-2">

<h3 class="text-yellow-400">Provisionamento</h3>

<input id="provNome" placeholder="nome"
class="w-full p-2 rounded text-black">

<input id="provValor" type="number" placeholder="valor total"
class="w-full p-2 rounded text-black">

<input id="provMes" placeholder="2026-03"
class="w-full p-2 rounded text-black">

<button onclick="salvarProv()"
class="bg-yellow-500 w-full p-3 rounded">
Salvar
</button>

<ul id="listaProv"></ul>

</div>


<!-- INVESTIMENTOS -->

<div class="card space-y-2">

<h3 class="text-green-400">Investimentos</h3>

<input id="invNome" placeholder="ativo"
class="w-full p-2 rounded text-black">

<input id="invValor" type="number" placeholder="valor"
class="w-full p-2 rounded text-black">

<button onclick="salvarInvest()"
class="bg-green-600 w-full p-3 rounded">
Salvar
</button>

<ul id="listaInv"></ul>

</div>


<!-- TRANSAÇÕES -->

<div class="card">

<h3 class="text-purple-400">Histórico</h3>

<ul id="lista"></ul>

</div>

</div>

</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
collection,
addDoc,
query,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyBOQwW7UlpweLNtCOsAUFY7Ds7KaxW8P9U",
authDomain: "finance-app-15fcc.firebaseapp.com",
projectId: "finance-app-15fcc",
storageBucket: "finance-app-15fcc.firebasestorage.app",
messagingSenderId: "1074672383107",
appId: "1:1074672383107:web:666b30885a928f3a8b57b6",
measurementId: "G-8LBL427YR0"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user
let chart



onAuthStateChanged(auth,(u)=>{

if(u){

user=u

document.getElementById("login").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

carregar()

}

})



window.register = async function(){

let email=emailInput()
let pass=passInput()

let cred = await createUserWithEmailAndPassword(auth,email,pass)

await setDoc(doc(db,"users",cred.user.uid),{
email
})

}



window.login = async function(){

await signInWithEmailAndPassword(auth,emailInput(),passInput())

}



function emailInput(){

return document.getElementById("email").value

}

function passInput(){

return document.getElementById("password").value

}



window.salvarTransacao = async function(){

let descricao=document.getElementById("descricao").value
let valor=parseFloat(document.getElementById("valor").value)
let tipo=document.getElementById("tipo").value
let data=document.getElementById("data").value

await addDoc(collection(db,"users",user.uid,"transacoes"),{
descricao,valor,tipo,data
})

carregar()

}



async function carregar(){

let lista=document.getElementById("lista")
lista.innerHTML=""

let saldo=0

const q=query(collection(db,"users",user.uid,"transacoes"))

let snapshot=await getDocs(q)

let receitas=0
let despesas=0

snapshot.forEach(doc=>{

let d=doc.data()

let li=document.createElement("li")

li.innerText=d.descricao+" R$"+d.valor

lista.appendChild(li)

if(d.tipo=="entrada"){
saldo+=d.valor
receitas+=d.valor
}
else{
saldo-=d.valor
despesas+=d.valor
}

})

document.getElementById("saldoTotal").innerText="R$ "+saldo

grafico(receitas,despesas)

}



function grafico(receitas,despesas){

if(chart) chart.destroy()

chart=new Chart(
document.getElementById("grafico"),
{
type:"doughnut",
data:{
labels:["Receitas","Despesas"],
datasets:[{
data:[receitas,despesas]
}]
}
}
)

}



window.salvarRecorrente = async function(){

let nome=document.getElementById("recNome").value
let valor=parseFloat(document.getElementById("recValor").value)
let dia=document.getElementById("recDia").value

await addDoc(collection(db,"users",user.uid,"recorrentes"),{
nome,valor,dia
})

}



window.salvarProv = async function(){

let descricao=document.getElementById("provNome").value
let valor=parseFloat(document.getElementById("provValor").value)
let mes=document.getElementById("provMes").value

await addDoc(collection(db,"users",user.uid,"provisoes"),{
descricao,valor,mes
})

}



window.salvarInvest = async function(){

let nome=document.getElementById("invNome").value
let valor=parseFloat(document.getElementById("invValor").value)

await addDoc(collection(db,"users",user.uid,"investimentos"),{
nome,valor
})

}

</script>

</body>
</html>
