await addDoc(collection(db,"users",user.uid,"recorrentes"),{ nome:document.getElementById("recNome").value, valor:parseFloat(document.getElementById("recValor").value), dia:parseInt(document.getElementById("recDia").value) }) } window.salvarProv=async function(){ await addDoc(collection(db,"users",user.uid,"provisoes"),{ nome:document.getElementById("provNome").value, valor:parseFloat(document.getElementById("provValor").value), mes:document.getElementById("provMes").value }) } window.salvarInvest=async function(){ await addDoc(collection(db,"users",user.uid,"investimentos"),{ nome:document.getElementById("invNome").value, valor:parseFloat(document.getElementById("invValor").value) }) } async function carregarDashboard(){ let saldo=0 const q=query(collection(db,"users",user.uid,"bancos")) let snap=await getDocs(q) snap.forEach(doc=>{ saldo+=doc.data().saldo }) document.getElementById("saldoTotal").innerText="R$ "+saldo } </script> </body> </html>
