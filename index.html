```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finance Manager</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:900px;
margin:auto;
}

input,button,select{
padding:10px;
margin:5px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:8px;
}

.menu{
margin-bottom:20px;
}

.section{
display:none;
}

.active{
display:block;
}

</style>
</head>

<body>

<div class="container">

<h2>Finance Manager</h2>

<div id="login">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="senha">

<button onclick="register()">Registrar</button>
<button onclick="login()">Entrar</button>

</div>


<div id="app" style="display:none">

<div class="menu">
<button onclick="mostrar('transacoes')">Transações</button>
<button onclick="mostrar('contas')">Contas Fixas</button>
<button onclick="mostrar('provisoes')">Provisionamentos</button>
<button onclick="mostrar('relatorio')">Relatório</button>
<button onclick="logout()">Sair</button>
</div>


<div id="transacoes" class="section active">

<h3>Nova Transação</h3>

<input id="descricao" placeholder="descrição">
<input id="valor" type="number" placeholder="valor">

<select id="tipo">
<option value="entrada">Receita</option>
<option value="saida">Despesa</option>
</select>

<input id="data" type="date">

<button onclick="salvarTransacao()">Salvar</button>

<table>
<thead>
<tr>
<th>Descrição</th>
<th>Valor</th>
<th>Tipo</th>
<th>Data</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>


<div id="contas" class="section">

<h3>Conta Fixa</h3>

<input id="contaNome" placeholder="nome">
<input id="contaValor" type="number" placeholder="valor">
<input id="contaVenc" type="number" placeholder="dia vencimento">

<button onclick="salvarConta()">Salvar</button>

<ul id="listaContas"></ul>

</div>


<div id="provisoes" class="section">

<h3>Provisionamento</h3>

<input id="provNome" placeholder="descrição">
<input id="provValor" type="number" placeholder="valor total">
<input id="provMes" placeholder="mes (2026-03)">

<button onclick="salvarProv()">Salvar</button>

<ul id="listaProv"></ul>

</div>


<div id="relatorio" class="section">

<h3>Relatório Mensal</h3>

<input id="mesRelatorio" placeholder="2026-03">

<button onclick="relatorio()">Gerar</button>

<h3 id="saldoMes"></h3>

</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
collection,
addDoc,
query,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


/* SUA CONFIGURAÇÃO FIREBASE */

const firebaseConfig = {
  apiKey: "AIzaSyBOQwW7UlpweLNtCOsAUFY7Ds7KaxW8P9U",
  authDomain: "finance-app-15fcc.firebaseapp.com",
  projectId: "finance-app-15fcc",
  storageBucket: "finance-app-15fcc.firebasestorage.app",
  messagingSenderId: "1074672383107",
  appId: "1:1074672383107:web:666b30885a928f3a8b57b6",
  measurementId: "G-8LBL427YR0"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

let user;



onAuthStateChanged(auth,(u)=>{

if(u){

user=u;

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

carregarTransacoes();
carregarContas();
carregarProv();

}else{

document.getElementById("login").style.display="block";
document.getElementById("app").style.display="none";

}

})



window.mostrar = function(id){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}



async function criarEstruturaUsuario(uid,email){

await setDoc(doc(db,"users",uid),{
email:email,
criadoEm:new Date()
})

await addDoc(
collection(db,"users",uid,"transacoes"),
{
descricao:"Conta criada",
valor:0,
tipo:"entrada",
data:new Date().toISOString().slice(0,10)
}
)

}



window.register = async function(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

let cred = await createUserWithEmailAndPassword(auth,email,password)

await criarEstruturaUsuario(cred.user.uid,email)

}



window.login = async function(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

await signInWithEmailAndPassword(auth,email,password)

}



window.logout = async function(){

await signOut(auth)

}



window.salvarTransacao = async function(){

let descricao=document.getElementById("descricao").value
let valor=parseFloat(document.getElementById("valor").value)
let tipo=document.getElementById("tipo").value
let data=document.getElementById("data").value

await addDoc(
collection(db,"users",user.uid,"transacoes"),
{
descricao,
valor,
tipo,
data
}
)

carregarTransacoes()

}



async function carregarTransacoes(){

let tbody=document.getElementById("lista")
tbody.innerHTML=""

const q=query(collection(db,"users",user.uid,"transacoes"))

let snapshot=await getDocs(q)

snapshot.forEach(doc=>{

let d=doc.data()

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${d.descricao}</td>
<td>${d.valor}</td>
<td>${d.tipo}</td>
<td>${d.data}</td>
`

tbody.appendChild(tr)

})

}



window.salvarConta = async function(){

let nome=document.getElementById("contaNome").value
let valor=parseFloat(document.getElementById("contaValor").value)
let venc=document.getElementById("contaVenc").value

await addDoc(
collection(db,"users",user.uid,"contas"),
{
nome,
valor,
vencimento:venc
}
)

carregarContas()

}



async function carregarContas(){

let ul=document.getElementById("listaContas")
ul.innerHTML=""

const q=query(collection(db,"users",user.uid,"contas"))

let snapshot=await getDocs(q)

snapshot.forEach(doc=>{

let d=doc.data()

let li=document.createElement("li")

li.innerText=d.nome+" - R$ "+d.valor+" dia "+d.vencimento

ul.appendChild(li)

})

}



window.salvarProv = async function(){

let descricao=document.getElementById("provNome").value
let valor=parseFloat(document.getElementById("provValor").value)
let mes=document.getElementById("provMes").value

await addDoc(
collection(db,"users",user.uid,"provisionamentos"),
{
descricao,
valor,
mes
}
)

carregarProv()

}



async function carregarProv(){

let ul=document.getElementById("listaProv")
ul.innerHTML=""

const q=query(collection(db,"users",user.uid,"provisionamentos"))

let snapshot=await getDocs(q)

snapshot.forEach(doc=>{

let d=doc.data()

let li=document.createElement("li")

li.innerText=d.descricao+" - R$ "+d.valor+" ("+d.mes+")"

ul.appendChild(li)

})

}



window.relatorio = async function(){

let mes=document.getElementById("mesRelatorio").value

const q=query(
collection(db,"users",user.uid,"transacoes")
)

let snapshot=await getDocs(q)

let saldo=0

snapshot.forEach(doc=>{

let d=doc.data()

if(d.data.startsWith(mes)){

if(d.tipo=="entrada") saldo+=d.valor
else saldo-=d.valor

}

})

document.getElementById("saldoMes").innerText="Saldo do mês: R$ "+saldo

}

</script>

</body>
</html>
```
