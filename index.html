<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Finance App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:sans-serif;
}

.card{
background:#1e293b;
border-radius:18px;
padding:18px;
}

.menu{
position:fixed;
left:0;
top:0;
height:100%;
width:220px;
background:#020617;
padding:20px;
}

.menu button{
display:block;
margin-bottom:10px;
width:100%;
text-align:left;
}

.content{
margin-left:230px;
padding:20px;
}

</style>

</head>

<body>

<div id="login" class="max-w-md mx-auto mt-20 card">

<h2 class="text-2xl mb-4 text-purple-400">Finance Login</h2>

<input id="email" placeholder="email" class="w-full p-3 mb-2 rounded text-black">

<input id="password" type="password" placeholder="senha" class="w-full p-3 mb-2 rounded text-black">

<button onclick="register()" class="bg-purple-600 p-3 w-full rounded mb-2">
Registrar
</button>

<button onclick="login()" class="bg-green-600 p-3 w-full rounded">
Entrar
</button>

</div>

<div id="app" style="display:none">

<div class="menu">

<h2 class="text-xl mb-4 text-purple-400">Finance</h2>

<button onclick="page('dashboard')">Dashboard</button> <button onclick="page('bancos')">Bancos</button>

<button onclick="logout()" class="mt-10 text-red-400">
Sair
</button>

</div>

<div class="content">

<div id="dashboard" class="page">

<div class="card mb-6">

<h2 class="text-gray-400">Saldo total</h2>

<h1 id="saldoTotal" class="text-4xl text-green-400">
R$0
</h1>

</div>

</div>

<div id="bancos" class="page hidden">

<div class="card mb-4">

<h3 class="text-blue-400">Adicionar banco</h3>

<input id="bancoNome"
placeholder="Banco"
class="p-2 rounded text-black">

<input id="bancoSaldo"
type="number"
placeholder="Saldo inicial"
class="p-2 rounded text-black">

<button onclick="salvarBanco()"
class="bg-blue-600 p-2 rounded">
Salvar </button>

</div>

<ul id="listaBancos"></ul>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
collection,
addDoc,
query,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyBOQwW7UlpweLNtCOsAUFY7Ds7KaxW8P9U",
authDomain: "finance-app-15fcc.firebaseapp.com",
projectId: "finance-app-15fcc",
storageBucket: "finance-app-15fcc.firebasestorage.app",
messagingSenderId: "1074672383107",
appId: "1:1074672383107:web:666b30885a928f3a8b57b6",
measurementId: "G-8LBL427YR0"

};


const appFirebase = initializeApp(firebaseConfig)
const auth = getAuth(appFirebase)
const db = getFirestore(appFirebase)

let user



onAuthStateChanged(auth,(u)=>{

if(u){

user=u

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

carregarDashboard()

}

})



window.page = function(p){

document.querySelectorAll(".page")
.forEach(x=>x.classList.add("hidden"))

document.getElementById(p)
.classList.remove("hidden")

}



window.register = async function(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

let cred = await createUserWithEmailAndPassword(
auth,
email,
password
)

await setDoc(doc(db,"users",cred.user.uid),{
email:email
})

}



window.login = async function(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

await signInWithEmailAndPassword(
auth,
email,
password
)

}



window.logout = async function(){

await signOut(auth)

}



window.salvarBanco = async function(){

const nome = document.getElementById("bancoNome").value
const saldo = parseFloat(document.getElementById("bancoSaldo").value)

await addDoc(collection(db,"users",user.uid,"bancos"),{
nome:nome,
saldo:saldo
})

carregarDashboard()

}



async function carregarDashboard(){

let saldo = 0

const q = query(collection(db,"users",user.uid,"bancos"))

let snap = await getDocs(q)

snap.forEach(doc=>{
saldo += doc.data().saldo
})

document.getElementById("saldoTotal").innerText="R$ "+saldo

}

</script>

</body>
</html>
