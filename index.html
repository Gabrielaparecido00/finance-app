<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Finance App</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:sans-serif;
}

.card{
background:#1e293b;
border-radius:18px;
padding:18px;
}

.menu{
position:fixed;
left:0;
top:0;
height:100%;
width:220px;
background:#020617;
padding:20px;
}

.menu button{
display:block;
margin-bottom:10px;
width:100%;
text-align:left;
}

.content{
margin-left:230px;
padding:20px;
}

</style>

</head>

<body>

<div id="login" class="max-w-md mx-auto mt-20 card">

<h2 class="text-2xl mb-4 text-purple-400">Finance Login</h2>

<input id="email" placeholder="email" class="w-full p-3 mb-2 rounded text-black">

<input id="password" type="password" placeholder="senha" class="w-full p-3 mb-2 rounded text-black">

<button onclick="register()" class="bg-purple-600 p-3 w-full rounded mb-2">
Registrar
</button>

<button onclick="login()" class="bg-green-600 p-3 w-full rounded">
Entrar
</button>

</div>

<div id="app" style="display:none">

<div class="menu">

<h2 class="text-xl mb-4 text-purple-400">Finance</h2>

<button onclick="page('dashboard')">Dashboard</button> <button onclick="page('bancos')">Bancos</button> <button onclick="page('transacoes')">Transações</button> <button onclick="page('extrato')">Extrato</button>

<button onclick="logout()" class="mt-10 text-red-400">
Sair
</button>

</div>

<div class="content">

<div id="dashboard" class="page">

<div class="card mb-6">

<h2 class="text-gray-400">Saldo total</h2>

<h1 id="saldoTotal" class="text-4xl text-green-400">
R$0
</h1>

</div>

<div class="card">

<canvas id="grafico"></canvas>

</div>

</div>

<div id="bancos" class="page hidden">

<div class="card mb-4">

<h3 class="text-blue-400">Adicionar banco</h3>

<input id="bancoNome"
placeholder="Banco"
class="p-2 rounded text-black">

<input id="bancoSaldo"
type="number"
placeholder="Saldo inicial"
class="p-2 rounded text-black">

<button onclick="salvarBanco()"
class="bg-blue-600 p-2 rounded">
Salvar </button>

</div>

<ul id="listaBancos"></ul>

</div>

<div id="transacoes" class="page hidden">

<div class="card mb-4">

<h3 class="text-purple-400">Nova transação</h3>

<input id="desc"
placeholder="Descrição"
class="p-2 rounded text-black">

<input id="valor"
type="number"
placeholder="Valor"
class="p-2 rounded text-black">

<select id="tipo" class="p-2 text-black rounded">

<option value="entrada">Receita</option>
<option value="saida">Despesa</option>

</select>

<input id="data"
type="date"
class="p-2 text-black rounded">

<button onclick="salvarTransacao()"
class="bg-purple-600 p-2 rounded">
Salvar </button>

</div>

<ul id="listaTransacoes"></ul>

</div>

<div id="extrato" class="page hidden">

<div class="card">

<h3 class="text-purple-400 mb-2">Extrato por período</h3>

<input id="dataInicio"
type="date"
class="p-2 text-black rounded">

<input id="dataFim"
type="date"
class="p-2 text-black rounded">

<button onclick="filtrarExtrato()"
class="bg-purple-600 p-2 rounded">
Filtrar </button>

<ul id="listaExtrato" class="mt-4"></ul>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
collection,
addDoc,
query,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyBOQwW7UlpweLNtCOsAUFY7Ds7KaxW8P9U",
authDomain: "finance-app-15fcc.firebaseapp.com",
projectId: "finance-app-15fcc",
storageBucket: "finance-app-15fcc.firebasestorage.app",
messagingSenderId: "1074672383107",
appId: "1:1074672383107:web:666b30885a928f3a8b57b6",
measurementId: "G-8LBL427YR0"

};



const appFirebase = initializeApp(firebaseConfig)
const auth = getAuth(appFirebase)
const db = getFirestore(appFirebase)

let user
let chart



onAuthStateChanged(auth,(u)=>{

if(u){

user=u

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

carregarDashboard()

}

})



window.page=function(p){

document.querySelectorAll(".page")
.forEach(x=>x.classList.add("hidden"))

document.getElementById(p)
.classList.remove("hidden")

}



window.register=async function(){

const email=emailInput()
const password=passInput()

let cred = await createUserWithEmailAndPassword(auth,email,password)

await setDoc(doc(db,"users",cred.user.uid),{
email:email
})

}



window.login=async function(){

await signInWithEmailAndPassword(
auth,
emailInput(),
passInput()
)

}



window.logout=async function(){

await signOut(auth)

}



function emailInput(){
return document.getElementById("email").value
}

function passInput(){
return document.getElementById("password").value
}



window.salvarBanco=async function(){

await addDoc(collection(db,"users",user.uid,"bancos"),{

nome:document.getElementById("bancoNome").value,
saldo:parseFloat(document.getElementById("bancoSaldo").value)

})

carregarDashboard()

}



window.salvarTransacao=async function(){

await addDoc(collection(db,"users",user.uid,"transacoes"),{

descricao:document.getElementById("desc").value,
valor:parseFloat(document.getElementById("valor").value),
tipo:document.getElementById("tipo").value,
data:document.getElementById("data").value

})

carregarDashboard()

}



async function carregarDashboard(){

let saldo=0
let receitas=0
let despesas=0

const q=query(collection(db,"users",user.uid,"transacoes"))

let snap=await getDocs(q)

snap.forEach(doc=>{

let d=doc.data()

if(d.tipo=="entrada"){
saldo+=d.valor
receitas+=d.valor
}
else{
saldo-=d.valor
despesas+=d.valor
}

})

document.getElementById("saldoTotal").innerText="R$ "+saldo

grafico(receitas,despesas)

}



function grafico(receitas,despesas){

if(chart) chart.destroy()

chart=new Chart(
document.getElementById("grafico"),
{
type:"doughnut",
data:{
labels:["Receitas","Despesas"],
datasets:[{
data:[receitas,despesas]
}]
}
}
)

}



window.filtrarExtrato=async function(){

listaExtrato.innerHTML=""

const q=query(collection(db,"users",user.uid,"transacoes"))

let snap=await getDocs(q)

snap.forEach(doc=>{

let d=doc.data()

if(d.data>=dataInicio.value && d.data<=dataFim.value){

let li=document.createElement("li")

li.innerText=d.descricao+" R$"+d.valor

listaExtrato.appendChild(li)

}

})

}

</script>

</body>
</html>
